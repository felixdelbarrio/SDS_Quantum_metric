name: release

on:
  push:
    branches: [master]

jobs:
  desktop-build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -e ".[dev,desktop]"
      - run: npm install
      - run: npm run build
      - run: python scripts/build_desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: quantum-metric-${{ matrix.os }}
          path: dist/**
