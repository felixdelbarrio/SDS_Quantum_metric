name: ci

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  backend-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check backend desktop scripts

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check backend desktop scripts

  backend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev,desktop]"
      - run: mypy backend desktop

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: coverage run -m pytest
      - run: coverage report

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: github/codeql-action/init@v3
        with:
          languages: python,javascript-typescript
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/scan_no_secrets.py
      - run: bandit -q -c bandit.yml -x backend/tests -r backend desktop scripts
      - uses: github/codeql-action/analyze@v3

  build-smoke:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - run: npm run build
